<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Local damage detection</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style_main.css') }}">
        <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    </head>
    <body>
        <div class="container">    
            <div class="sidebar">
                <h2>Menu</h2>
                <nav>
                    <a href="{{ url_for('files_page.files') }}">Files</a>
                    <a href="{{ url_for('load_page.load') }}">Load data</a>
                    <a href="{{ url_for('generate_page.generate') }}">Generate data</a>
                    <a href="{{ url_for('info_page.info') }}">Info</a>
                </nav>
            </div>
            <div id="content">
                {% block content %}
                <h2>Welcome to Local Damage Detection System</h2>
                <p>Select an option from the menu to begin.</p>
                {% endblock %}
            </div>
        </div>
    </body>
</html>
