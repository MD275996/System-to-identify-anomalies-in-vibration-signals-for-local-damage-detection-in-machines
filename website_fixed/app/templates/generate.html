{% extends "base.html" %}
{% block content %}

<h1>Generate data</h1>
<h1>Fill out the form</h1>
<form id="generateForm">
    <label>Name:</label><br>
    <input type="text" name="field1" required value="gen_sig"><br><br>

    <label>Impuls amplitude:</label><br>
    <input type="text" name="field2" required value="10"><br><br>
    
    <label>Sampling frequency:</label><br>
    <input type="text" name="field3" required value="25000"><br><br>
    
    <label>Signal length:</label><br>
    <input type="text" name="field4" required value="25000"><br><br>
    
    <label>Pulse repetition frequency:</label><br>
    <input type="text" name="field5" required value="13"><br><br>
    
    <label>Band center [Hz]:</label><br>
    <input type="text" name="field6" required value="2500"><br><br>
    
    <label>Band width [Hz]:</label><br>
    <input type="text" name="field7" required value="500"><br><br>
    
    <label>Shift:</label><br>
    <input type="text" name="field8" required value="0"><br><br>
    
    <button type="submit">Generuj sygnał</button>
</form>

<script src="{{ url_for('static', filename='js/generate.js')}}"></script>
{% endblock %}
